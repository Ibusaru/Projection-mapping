<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projection Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .status-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            box-shadow: 0 0 8px #f44336;
        }
        .status-dot.connected {
            background: #00e676;
            box-shadow: 0 0 8px #00e676;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-panel h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 48px;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.95);
        }

        button.active {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        button.danger {
            background: rgba(244, 67, 54, 0.2);
            border-color: rgba(244, 67, 54, 0.5);
            color: #ff8a80;
        }

        input[type="color"] {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            outline: none;
            margin: 15px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        
        .row {
            display: flex;
            gap: 10px;
        }
        .row button {
            flex: 1;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            color: #333;
        }
        .modal-content h2 { margin-top: 0; color: #333; }
        #modal-qrcode { margin: 20px auto; width: 200px; height: 200px; }
        .close-btn {
            background: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 420px; box-sizing: border-box;">
        <h1>PROJECTION FX</h1>
        <button id="btn-show-qr" style="min-height: auto; padding: 8px 12px; font-size: 0.8rem; border-radius: 20px;">QR表示</button>
    </div>
    
    <div class="status-container">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Connecting...</span>
    </div>

    <div class="glass-panel">
        <h2>オブジェクト生成</h2>
        <div class="btn-grid" style="margin-bottom: 10px;">
            <button onclick="spawnObject('cube')">Cube</button>
            <button onclick="spawnObject('sphere')">Sphere</button>
            <button onclick="spawnObject('torus')">Torus</button>
        </div>
        <button class="danger" style="width: 100%;" onclick="sendAction('clear_objects')">すべて削除</button>
    </div>

    <div class="glass-panel">
        <h2>エフェクトスタイル</h2>
        <div class="btn-grid" id="effect-buttons">
            <button data-effect="fire" class="active">Fire</button>
            <button data-effect="water">Water</button>
            <button data-effect="lightning">Lightning</button>
            <button data-effect="magic">Magic</button>
        </div>
    </div>

    <div class="glass-panel">
        <h2>カラー & 強度</h2>
        <input type="color" id="color-picker" value="#ff4400">
        <input type="range" id="intensity-slider" min="0" max="100" value="80">
    </div>

    <div class="glass-panel">
        <h2>アニメーション制御</h2>
        <div class="row">
            <button id="btn-play">▶ 再生</button>
            <button id="btn-pause">⏸ 一時停止</button>
        </div>
        <button id="btn-reset" style="width: 100%; margin-top: 10px;">リセット</button>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>アクセス用QRコード</h2>
            <div id="modal-qrcode"></div>
            <button class="close-btn" onclick="closeQrModal()">閉じる</button>
        </div>
    </div>

    <script src="controller.js"></script>
</body>
</html>
